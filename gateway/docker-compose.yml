services:
  gateway:
    container_name: gateway
    image: hyperf-skeleton
    build:
      dockerfile: dev.Dockerfile
      args:
        UID: 1000
        GID: 1000
    volumes:
      - ./:/opt/www
      - ../packages:/opt/packages
    ports:
      - 9502:9501
    environment:
      - APP_ENV=dev
      - SCAN_CACHEABLE=false
    networks:
      - auth-gateway
      - transaction-gateway
      - auth-cache
      - messaging
    env_file:
      - .env
    develop:
      watch:
        - action: restart
          path: app

networks:
  auth-gateway:
  transaction-gateway:
  auth-cache:
  messaging:
