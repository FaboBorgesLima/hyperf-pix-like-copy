services:
  auth:
    container_name: auth
    image: hyperf-skeleton
    build:
      dockerfile: dev.Dockerfile
      args:
        UID: 1000
        GID: 1000
    volumes:
      - ./:/opt/www
      - ../packages:/opt/packages
    ports:
      - 9501:9501
    environment:
      - APP_ENV=dev
      - SCAN_CACHEABLE=false
    env_file:
      - .env
    develop:
      watch:
        - action: restart
          path: app
    networks:
      - auth-internal
      - auth-cache
      - auth-gateway
      - messaging
    depends_on:
      - postgres-auth
      - redis-auth
  postgres-auth:
    image: postgres:17
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - auth-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USERNAME} -d $${DB_DATABASE}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
  redis-auth:
    image: redis:7
    env_file:
      - .env
    networks:
      - auth-cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
networks:
  auth-internal:
    name: auth-internal
    driver: bridge
  auth-cache:
  auth-gateway:
  messaging: