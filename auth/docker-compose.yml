services:
  auth:
    container_name: auth
    image: hyperf-skeleton
    build:
      dockerfile: dev.Dockerfile
      args:
        UID: 1000
        GID: 1000
    volumes:
      - ./:/opt/www
      - ../packages:/opt/packages
    ports:
      - 9501:9501
    environment:
      - APP_ENV=dev
      - SCAN_CACHEABLE=false
    env_file:
      - .env
    develop:
      watch:
        - action: restart
          path: app
    networks:
      - auth-internal
      - shared
      - auth-gateway
  postgres-auth:
    image: postgres:17
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - auth-internal
  redis-auth:
    image: redis:7
    env_file:
      .env
    networks:
      - auth-internal
      - shared
networks:
  auth-internal:
    name: auth-internal
    driver: bridge
  shared:
    external: true
  auth-gateway:
    external: true
